spring:
  application:
    name: smart-energy-monitor

  datasource:
    url: jdbc:postgresql://localhost:5432/energy_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: energy-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.energy.dto"

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:smart-energy-secret-key-2024-minimum-256-bit-length-required}
    expiration: 86400000
  kafka:
    topic:
      energy-readings: energy-readings
      alerts: energy-alerts
  energy:
    alert-threshold-kwh: 10.0
    simulation-interval-ms: 30000

logging:
  level:
    com.energy: INFO
